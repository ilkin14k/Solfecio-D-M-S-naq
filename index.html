<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solfecio SńĪnaq ńįmtahanńĪ ‚ÄĒ DńįM formatńĪ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBFBF8;
  --card:#FFFFFF;
  --ink:#23283D;
  --muted:#7A7F94;
  --line:#ECEDF2;
  --accent:#3554D1;
  --accent-soft:#EEF1FD;
  --ok:#14804A;
  --ok-soft:#E6F5EC;
  --bad:#C63B3B;
  --bad-soft:#FCEDED;
  --gold:#C9930A;
  --r:18px;
  --shadow:0 2px 18px rgba(35,40,61,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;line-height:1.55;
}
.wrap{max-width:640px;margin:0 auto;padding:24px 18px 56px}

/* ---------- baŇülńĪq ---------- */
header{padding:14px 0 4px}
.eyebrow{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:800}
h1{font-family:'Spectral',Georgia,serif;font-weight:700;font-size:clamp(27px,6.5vw,36px);line-height:1.12;margin-top:8px;letter-spacing:-.01em}
.sub{color:var(--muted);margin-top:10px;font-size:15px;max-width:46ch}

/* ---------- proqres ŇütatńĪ ---------- */
.progress-staff{margin:20px 0 2px}
.progress-staff svg{width:100%;height:auto;display:block}
.meta-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);font-weight:700;margin-top:6px}
.meta-left{display:flex;align-items:center;gap:10px}
.streak{
  display:none;align-items:center;gap:4px;
  background:#FFF7E3;color:var(--gold);
  border-radius:999px;padding:3px 10px;font-size:12.5px;font-weight:800;
}
.streak.on{display:inline-flex}
.timer{font-variant-numeric:tabular-nums}

/* ---------- kartlar ---------- */
.card{background:var(--card);border-radius:var(--r);padding:26px 22px;margin-top:18px;box-shadow:var(--shadow)}
.section-tag{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.qnum{font-family:'Spectral',Georgia,serif;font-weight:600;font-size:14px;color:var(--muted);margin-top:14px}
.qtext{font-family:'Spectral',Georgia,serif;font-size:20px;font-weight:600;margin-top:6px;line-height:1.42}
.notation{margin:18px 0 4px;padding:10px 6px;border-radius:14px;background:var(--bg);overflow-x:auto}
.notation svg{display:block;margin:0 auto;max-width:100%}

/* ---------- variantlar ---------- */
.opts{margin-top:16px;display:grid;gap:9px}
.opt{
  display:flex;align-items:flex-start;gap:12px;width:100%;
  min-height:50px;padding:13px 15px;border-radius:14px;
  border:none;background:#F5F6F9;color:var(--ink);
  font-family:inherit;font-size:15.5px;font-weight:600;text-align:left;
  cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s;
}
.opt:not(:disabled):hover{background:var(--accent-soft)}
.opt:not(:disabled):active{transform:scale(.985)}
.opt:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.opt .letter{
  flex:0 0 27px;height:27px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:#fff;color:var(--muted);font-weight:800;font-size:13px;margin-top:1px;
  box-shadow:0 1px 3px rgba(35,40,61,.1);
}
.opt.correct{background:var(--ok-soft)}
.opt.correct .letter{background:var(--ok);color:#fff;box-shadow:none}
.opt.wrong{background:var(--bad-soft)}
.opt.wrong .letter{background:var(--bad);color:#fff;box-shadow:none}
.opt:disabled{cursor:default}
.opt:disabled:not(.correct):not(.wrong){opacity:.45}

/* ---------- dinl…ôm…ô ---------- */
.audio-panel{
  margin:18px 0 4px;padding:18px;border-radius:14px;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;gap:9px;
}
.play-btn{
  min-height:54px;min-width:180px;border:none;border-radius:999px;cursor:pointer;
  background:var(--accent);color:#fff;font-family:inherit;font-size:16.5px;font-weight:800;
  box-shadow:0 4px 14px rgba(53,84,209,.25);
  transition:filter .15s,transform .1s;
}
.play-btn:hover{filter:brightness(1.07)}
.play-btn:active{transform:scale(.97)}
.play-btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.audio-hint{font-size:12.5px;color:var(--muted);font-weight:600}

/* ---------- izah ---------- */
.izah{margin-top:16px;padding:15px 17px;border-radius:14px;font-size:14.5px;background:var(--ok-soft);animation:fadeUp .25s ease}
.izah.err{background:var(--bad-soft)}
.izah .praise{display:block;font-weight:800;margin-bottom:3px}
.izah.err .praise{color:var(--bad)}
.izah:not(.err) .praise{color:var(--ok)}
.izah b{font-weight:800}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.izah{animation:none}.opt{transition:none}}

/* ---------- naviqasiya ---------- */
.nav-row{display:flex;gap:10px;margin-top:20px}
.btn{
  flex:1;min-height:52px;border-radius:14px;border:none;cursor:pointer;
  font-family:inherit;font-size:16px;font-weight:800;
  transition:filter .15s,transform .1s;
}
.btn:active{transform:scale(.98)}
.btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(53,84,209,.22)}
.btn-primary:hover{filter:brightness(1.07)}
.btn-primary:disabled{background:var(--line);color:var(--muted);box-shadow:none;cursor:default}
.btn-ghost{background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1.5px var(--line)}
.btn-ghost:hover{box-shadow:inset 0 0 0 1.5px var(--accent);color:var(--accent)}

/* ---------- sual x…ôrit…ôsi ---------- */
.qmap{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px}
.qdot{
  width:33px;height:33px;border-radius:10px;border:none;background:#fff;
  font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;box-shadow:inset 0 0 0 1.5px var(--line);
}
.qdot.now{box-shadow:inset 0 0 0 2px var(--accent);color:var(--accent)}
.qdot.ok{background:var(--ok-soft);box-shadow:none;color:var(--ok)}
.qdot.bad{background:var(--bad-soft);box-shadow:none;color:var(--bad)}

/* ---------- baŇülanńüńĪc / n…ôtic…ô ---------- */
.hero-staff{margin:6px 0 8px}
.start-list{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.start-list .row{
  display:flex;flex-direction:column;gap:2px;
  padding:12px 14px;border-radius:12px;background:var(--bg);
  font-size:13.5px;font-weight:700;
}
.start-list .row span:last-child{color:var(--muted);font-weight:600;font-size:12.5px}
.motto{
  margin-top:18px;padding:14px 16px;border-radius:14px;
  background:var(--accent-soft);color:var(--accent);
  font-size:14.5px;font-weight:700;text-align:center;
}
.history{margin-top:20px}
.history h3{font-family:'Spectral',Georgia,serif;font-size:16px;font-weight:700;margin-bottom:6px}
.h-row{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;color:var(--muted)}
.h-row:last-child{border-bottom:none}
.h-row .g{color:var(--ok)} .h-row .cb{color:var(--accent)} .h-row .r{color:var(--bad)}
.score-big{font-family:'Spectral',Georgia,serif;font-weight:700;font-size:clamp(46px,13vw,68px);line-height:1;margin-top:12px}
.score-big small{font-size:.38em;color:var(--muted);font-weight:500}
.verdict{margin-top:8px;font-size:16.5px;font-weight:800}
.bars{margin-top:20px;display:grid;gap:13px}
.bar-row .lbl{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:5px}
.bar-row .lbl span:last-child{color:var(--muted)}
.bar{height:8px;border-radius:99px;background:var(--bg);overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;transition:width .5s ease}
footer{margin-top:30px;text-align:center;font-size:12.5px;color:var(--muted)}
.hidden{display:none !important}
</style>
</head>
<body>

<script>
"use strict";

/* =========================================================
   1. NOTA RENDERńį ‚ÄĒ sad…ô SVG Ňütat √ß…ôkicisi
   ========================================================= */
const STEP = 6;
const LETTER_IDX = {C:0, D:1, E:2, F:3, G:4, A:5, H:6, B:6};
const ACC_GLYPH  = {"b":"\u266D", "#":"\u266F", "n":"\u266E"};

function noteIdx(name){
  return parseInt(name.slice(1),10) * 7 + LETTER_IDX[name[0].toUpperCase()];
}

function renderNotation(container, groups, opts){
  opts = opts || {};
  const gapX = opts.gapX || 58, startX = 66;
  const width = startX + groups.length * gapX + 26;
  const topY = 34, lineGap = 12;
  const bottomLineY = topY + 4 * lineGap;
  const yOf = idx => bottomLineY - (idx - 30) * STEP;
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox", `0 0 ${width} ${topY + 4*lineGap + 40}`);
  svg.setAttribute("width", Math.min(width, 540));
  svg.setAttribute("role","img");
  const line = (x1,y1,x2,y2,w) => {
    const l = document.createElementNS(NS,"line");
    l.setAttribute("x1",x1); l.setAttribute("y1",y1);
    l.setAttribute("x2",x2); l.setAttribute("y2",y2);
    l.setAttribute("stroke","#23283D"); l.setAttribute("stroke-width", w || 1.1);
    svg.appendChild(l);
  };
  for (let i=0;i<5;i++) line(8, topY+i*lineGap, width-10, topY+i*lineGap);
  line(width-10, topY, width-10, topY+4*lineGap, 2.4);
  const clef = document.createElementNS(NS,"text");
  clef.setAttribute("x",14); clef.setAttribute("y",bottomLineY+3);
  clef.setAttribute("font-size","58"); clef.setAttribute("fill","#23283D");
  clef.textContent = "\uD834\uDD1E";
  svg.appendChild(clef);
  groups.forEach((chord, gi) => {
    const cx = startX + gi * gapX;
    chord.forEach(note => {
      const idx = noteIdx(note.n), cy = yOf(idx);
      if (idx < 30) for (let e=28; e >= (idx%2===0?idx:idx-1); e-=2) line(cx-12,yOf(e),cx+12,yOf(e));
      if (idx > 38) for (let e=40; e <= (idx%2===0?idx:idx+1); e+=2) line(cx-12,yOf(e),cx+12,yOf(e));
      const outer = document.createElementNS(NS,"ellipse");
      outer.setAttribute("cx",cx); outer.setAttribute("cy",cy);
      outer.setAttribute("rx",7.6); outer.setAttribute("ry",5);
      outer.setAttribute("fill","#23283D");
      svg.appendChild(outer);
      const inner = document.createElementNS(NS,"ellipse");
      inner.setAttribute("cx",cx); inner.setAttribute("cy",cy);
      inner.setAttribute("rx",4.1); inner.setAttribute("ry",2.5);
      inner.setAttribute("fill","#fff");
      inner.setAttribute("transform",`rotate(-22 ${cx} ${cy})`);
      svg.appendChild(inner);
      if (note.acc){
        const a = document.createElementNS(NS,"text");
        a.setAttribute("x",cx-20); a.setAttribute("y",cy+5);
        a.setAttribute("font-size","19"); a.setAttribute("fill","#23283D");
        a.textContent = ACC_GLYPH[note.acc];
        svg.appendChild(a);
      }
    });
  });
  container.innerHTML = "";
  container.appendChild(svg);
}

/* =========================================================
   2. SUAL BAZASI ‚ÄĒ 90 sual, DńįM 2025 strukturu √ľzr…ô
   ========================================================= */
const S = {
  INT:"ńįntervallar", AKK:"Akkordlar", LAD:"Qammalar v…ô ladlar",
  TON:"TonallńĪqlar", RIT:"Ritm v…ô √∂l√ß√ľ", MEQ:"Az…ôrbaycan m…ôqamlarńĪ",
  TEM:"Temp v…ô dinamika", DIN:"Dinl…ôm…ô", UMM:"√úmumi n…ôz…ôriyy…ô"
};

const QUESTIONS = [
/* ================= ńįNTERVALLAR (18) ================= */
{ b:S.INT, q:"VerilmiŇü intervalńĪ t…ôyin edin.", nota:[[{n:"F4"},{n:"H4"}]],
  o:["x‚āĄ","art.‚āĄ","…ôsk.‚āÖ","b‚āÉ","x‚āÖ"], c:1,
  izah:"F‚ÄďH intervalńĪ 3 tondan ibar…ôtdir (triton). H…ôrf h…ôcmi kvartadńĪr ‚ÄĒ <b>artńĪrńĪlmńĪŇü kvarta (art.‚āĄ)</b>." },
{ b:S.INT, q:"VerilmiŇü intervalńĪ t…ôyin edin.", nota:[[{n:"H3"},{n:"F4"}]],
  o:["x‚āÖ","art.‚āĄ","…ôsk.‚āÖ","k‚āÜ","x‚āĄ"], c:2,
  izah:"H‚ÄďF d…ô 3 tondur, lakin h…ôrf h…ôcmi kvintadńĪr ‚ÄĒ <b>…ôskildilmiŇü kvinta (…ôsk.‚āÖ)</b>." },
{ b:S.INT, q:"VerilmiŇü intervalńĪ t…ôyin edin.", nota:[[{n:"C4"},{n:"A4"}]],
  o:["k‚āÜ","b‚āÜ","x‚āÖ","k‚āá","b‚āá"], c:1,
  izah:"C‚ÄďA intervalńĪ 4,5 tondur, h…ôrf h…ôcmi sekstadńĪr ‚ÄĒ <b>b√∂y√ľk seksta (b‚āÜ)</b>." },
{ b:S.INT, q:"b‚āā intervalńĪ ne√ß…ô yarńĪmtondan ibar…ôtdir?",
  o:["1 yarńĪmton","2 yarńĪmton","3 yarńĪmton","4 yarńĪmton","yarńĪmton yoxdur"], c:1,
  izah:"B√∂y√ľk sekunda <b>1 tona = 2 yarńĪmtona</b> b…ôrab…ôrdir. Ki√ßik sekunda is…ô 1 yarńĪmtondur." },
{ b:S.INT, q:"b‚āá intervalńĪ ne√ß…ô tondan ibar…ôtdir?",
  o:["5 ton","5,5 ton","6 ton","4,5 ton","3,5 ton"], c:1,
  izah:"B√∂y√ľk septima <b>5,5 tondur</b> (11 yarńĪmton). Ki√ßik septima is…ô 5 tondur." },
{ b:S.INT, q:"k‚āÉ intervalńĪ natural major qammasńĪnńĪn ne√ß…ônci pill…ôl…ôrind…ôn qurulur?",
  o:["II, III, VI, VII","I, IV, V","I, II, III","IV, V, VII","II, IV, VI"], c:0,
  izah:"Natural majorda ki√ßik tersiya <b>II, III, VI, VII</b> pill…ôl…ôrd…ôn qurulur." },
{ b:S.INT, q:"b‚āÉ intervalńĪ natural major qammasńĪnńĪn ne√ß…ônci pill…ôl…ôrind…ôn qurulur?",
  o:["I, IV, V","II, III, VI","III, VI, VII","I, II, IV","IV, V, VII"], c:0,
  izah:"B√∂y√ľk tersiya natural majorda <b>I, IV, V</b> pill…ôl…ôrd…ôn qurulur ‚ÄĒ bunlar …ôsas pill…ôl…ôrdir." },
{ b:S.INT, q:"x‚āÖ intervalńĪ natural major qammasńĪnńĪn hansńĪ pill…ôsind…ô qurulmur?",
  o:["II","IV","V","VII","VI"], c:3,
  izah:"<b>VII pill…ôd…ô</b> xalis kvinta yox, …ôsk.‚āÖ qurulur (C-dur-da H‚ÄďF)." },
{ b:S.INT, q:"Harmonik minorda art.‚āā intervalńĪ hansńĪ pill…ôd…ô qurulur?",
  o:["II","IV","VI","VII","V"], c:2,
  izah:"VII pill…ônin y√ľks…ôldilm…ôsi n…ôtic…ôsind…ô <b>VI‚ÄďVII pill…ôl…ôr arasńĪnda art.‚āā</b> yaranńĪr (a-moll: f‚Äďgis)." },
{ b:S.INT, q:"Natural minorda art.‚āĄ intervalńĪ hansńĪ pill…ôd…ô qurulur?",
  o:["II","IV","VI","VII","III"], c:2,
  izah:"Natural minorda triton: <b>VI pill…ôd…ô art.‚āĄ</b> (a-moll: f‚Äďh), II pill…ôd…ô is…ô …ôsk.‚āÖ qurulur." },
{ b:S.INT, q:"x‚āĄ intervalńĪnńĪn √ßevrilm…ôsi hansńĪ intervaldńĪr?",
  o:["x‚āÖ","art.‚āĄ","k‚āÖ","…ôsk.‚āĄ","x‚āą"], c:0,
  izah:"Kvarta kvintaya √ßevrilir, xalis interval xalis qalńĪr: <b>x‚āĄ ‚Üí x‚āÖ</b>." },
{ b:S.INT, q:"b‚āÜ intervalńĪnńĪn √ßevrilm…ôsi hansńĪ intervaldńĪr?",
  o:["b‚āÉ","k‚āÉ","x‚āÉ","k‚āÜ","b‚āā"], c:1,
  izah:"Seksta tersiyaya, b√∂y√ľk interval ki√ßiy…ô √ßevrilir: <b>b‚āÜ ‚Üí k‚āÉ</b>." },
{ b:S.INT, q:"k‚āá intervalńĪnńĪn √ßevrilm…ôsi hansńĪ intervaldńĪr?",
  o:["k‚āā","b‚āā","b‚āá","x‚āā","k‚āÉ"], c:1,
  izah:"Septima sekundaya, ki√ßik interval b√∂y√ľy…ô √ßevrilir: <b>k‚āá ‚Üí b‚āā</b>." },
{ b:S.INT, q:"x‚āĀ (prima) intervalńĪnńĪn √ßevrilm…ôsi hansńĪ intervaldńĪr?",

const SB_URL   = "https://uwdkjxdhwauhynborsht.supabase.co";
const SB_KEY   = "sb_publishable_WdpSM2WkX43wKWvxnYg-Cw_Llt8fyYg";
const SB_STORE = "solfecio_session";

function storeSession(d){
  const s = {
    access_token: d.access_token,
    refresh_token: d.refresh_token,
    expires_at: d.expires_at || Math.floor(Date.now()/1000) + (d.expires_in || 3600)
  };
  try { localStorage.setItem(SB_STORE, JSON.stringify(s)); } catch(e){}
  return s;
}

async function getSession(){
  let s = null;
  try { s = JSON.parse(localStorage.getItem(SB_STORE)); } catch(e){}
  const now = Math.floor(Date.now()/1000);
  if (s && s.access_token && s.expires_at - 60 > now) return s;
  if (s && s.refresh_token){
    const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
      method:"POST", headers:{ apikey:SB_KEY, "Content-Type":"application/json" },
      body: JSON.stringify({ refresh_token: s.refresh_token })
    });
    if (r.ok) return storeSession(await r.json());
  }
  const r = await fetch(`${SB_URL}/auth/v1/signup`, {
    method:"POST", headers:{ apikey:SB_KEY, "Content-Type":"application/json" }, body:"{}"
  });
  if (!r.ok) throw new Error("auth failed");
  return storeSession(await r.json());
}

async function saveResult(payload){
  try {
    const s = await getSession();
    await fetch(`${SB_URL}/rest/v1/solfecio_results`, {
      method:"POST",
      headers:{ apikey:SB_KEY, Authorization:"Bearer "+s.access_token,
                "Content-Type":"application/json", Prefer:"return=minimal" },
      body: JSON.stringify(payload)
    });
  } catch(e){ /* offlayn rejim */ }
}

async function loadHistory(){
  const box = $("history");
  if (!box) return;
  try {
    const s = await getSession();
    const r = await fetch(`${SB_URL}/rest/v1/solfecio_results?select=score,total,pct,created_at&order=created_at.desc&limit=8`, {
      headers:{ apikey:SB_KEY, Authorization:"Bearer "+s.access_token }
    });
    if (!r.ok) throw 0;
    const rows = await r.json();
    if (!rows.length){ box.innerHTML = ""; return; }
    box.innerHTML = "<h3>∆Źvv…ôlki n…ôtic…ôl…ôr</h3>" + rows.map(x => {
      const d = new Date(x.created_at);
      const t = d.toLocaleDateString("az-AZ",{day:"2-digit",month:"2-digit"}) +
                " ¬∑ " + d.toLocaleTimeString("az-AZ",{hour:"2-digit",minute:"2-digit"});
      const cls = x.pct >= 70 ? "g" : x.pct >= 50 ? "cb" : "r";
      return `<div class="h-row"><span>${t}</span><span class="${cls}">${x.score}/${x.total} ‚ÄĒ ${x.pct}%</span></div>`;
    }).join("");
  } catch(e){ box.innerHTML = ""; }
}

const ENCOURAGE = ["Eybi yox ‚ÄĒ izaha bax, yadda qalacaq.","S…ôhvd…ôn √∂yr…ônilir. Davam!","Bu m√∂vzuya bir d…ô n…ôz…ôr sal.","N√∂vb…ôti d…ôf…ô m√ľtl…ôq alńĪnacaq!"];

  "Bu g√ľn 30 sual ‚ÄĒ sabah imtahanda …ôminlik.",

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* b√∂lm…ôl…ôr √ľzr…ô m√ľt…ônasib t…ôsad√ľfi se√ßim */
function pickRandom(count){
  const bySec = {};
  QUESTIONS.forEach((q, i) => { (bySec[q.b] = bySec[q.b] || []).push(i); });
  const secs = Object.keys(bySec);
  const total = QUESTIONS.length;
  let picked = [], fracs = [];
  secs.forEach(sec => {
    const exact = bySec[sec].length * count / total;
    const take = Math.floor(exact);
    fracs.push({ sec, frac: exact - take });
    picked = picked.concat(shuffle(bySec[sec]).slice(0, take));
  });
  fracs.sort((a,b) => b.frac - a.frac);
  let fi = 0;
  while (picked.length < count && fi < fracs.length){
    const sec = fracs[fi++].sec;
    const extra = bySec[sec].find(i => !picked.includes(i));
    if (extra !== undefined) picked.push(extra);
  }
  return shuffle(picked);
}

function buildVariants(qIndexes){
  variants = {};
  qIndexes.forEach(qi => {
    const q = QUESTIONS[qi];
    const perm = shuffle(q.o.map((_, i) => i));
    variants[qi] = { opts: perm.map(i => q.o[i]), c: perm.indexOf(q.c) };
  });
}

const correctOf = qi => variants[qi] ? variants[qi].c : QUESTIONS[qi].c;

/* ---- s…ôs m√ľh…ôrriki (Web Audio API) ---- */
let audioCtx = null, currentAudio = null;
function getCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(midi, t0, dur, vol){
  const c = getCtx();
  const o = c.createOscillator(), g = c.createGain();
  o.type = "triangle";
  o.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol || 0.22, t0 + 0.03);
  g.gain.setValueAtTime(vol || 0.22, Math.max(t0 + 0.03, t0 + dur - 0.1));
  g.gain.linearRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function playAudio(a){
  if (!a) return;
  try {
    const c = getCtx();
    let t = c.currentTime + 0.08;
    if (a.type === "scale"){
      a.notes.forEach(m => { tone(m, t, 0.45); t += 0.5; });
      return;
    }
    a.notes.forEach(m => { tone(m, t, 0.55); t += 0.62; });   // melodik
    t += 0.3;
    a.notes.forEach(m => tone(m, t, 1.5, 0.16));              // harmonik
  } catch(e){ /* audio d…ôst…ôkl…ônmirs…ô s…ôssiz ke√ß */ }
}
document.getElementById("btn-play").addEventListener("click", () => playAudio(currentAudio));

function fmtTime(ms){
  const s = Math.floor(ms/1000);
  return String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
}

/* ---- proqres ŇütatńĪ ---- */
function drawProgressStaff(){
  const el = $("progress-staff");
  const n = order.length;
  const W = 640, H = 46, top = 8, gap = 7.5;
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  for (let i=0;i<5;i++){
    const l = document.createElementNS(NS,"line");
    l.setAttribute("x1",0); l.setAttribute("x2",W);
    l.setAttribute("y1",top+i*gap); l.setAttribute("y2",top+i*gap);
    l.setAttribute("stroke","#ECEDF2"); l.setAttribute("stroke-width",1);
    svg.appendChild(l);
  }
  const span = W - 26;
  order.forEach((qi, i) => {
    const x = 13 + (n === 1 ? span/2 : i * span/(n-1));
    const answered = answers[qi] !== undefined;
    const yLevels = [top+4*gap, top+3*gap, top+2*gap, top+1*gap];
    const y = yLevels[i % 4];
    const c = document.createElementNS(NS,"ellipse");
    c.setAttribute("cx",x); c.setAttribute("cy",y);
    c.setAttribute("rx",4.2); c.setAttribute("ry",3.2);
    c.setAttribute("transform",`rotate(-18 ${x} ${y})`);
    if (answered){
      c.setAttribute("fill", answers[qi] === correctOf(qi) ? "#14804A" : "#C63B3B");
    } else {
      c.setAttribute("fill", i === pos ? "#3554D1" : "none");
      c.setAttribute("stroke", i === pos ? "#3554D1" : "#C9CCDA");
      c.setAttribute("stroke-width","1.3");
    }
    svg.appendChild(c);
  });
  el.innerHTML = ""; el.appendChild(svg);
}

function drawHeroStaff(){
  const el = $("hero-staff");
  const NS = "http://www.w3.org/2000/svg";
  const W = 640, H = 60, top = 10, gap = 9;
  const svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width","100%");
  for (let i=0;i<5;i++){
    const l = document.createElementNS(NS,"line");
    l.setAttribute("x1",0); l.setAttribute("x2",W);
    l.setAttribute("y1",top+i*gap); l.setAttribute("y2",top+i*gap);
    l.setAttribute("stroke","#ECEDF2");
    svg.appendChild(l);
  }
  const clef = document.createElementNS(NS,"text");
  clef.setAttribute("x",8); clef.setAttribute("y",top+4*gap+2);
  clef.setAttribute("font-size","42"); clef.setAttribute("fill","#3554D1");
  clef.textContent = "\uD834\uDD1E";
  svg.appendChild(clef);
  [92,168,244,320,396,472,548].forEach((x,i) => {
    const y = top + 4*gap - (i*5)%(4*gap);
    const e = document.createElementNS(NS,"ellipse");
    e.setAttribute("cx",x); e.setAttribute("cy",Math.max(top,y));
    e.setAttribute("rx",5.2); e.setAttribute("ry",3.9);
    e.setAttribute("transform",`rotate(-18 ${x} ${y})`);
    e.setAttribute("fill", i%3===0 ? "#3554D1" : "#23283D");
    svg.appendChild(e);
  });
  el.innerHTML = ""; el.appendChild(svg);
}

/* ---- ekranlar ---- */
function show(screen){
  ["screen-start","screen-quiz","screen-result"].forEach(id =>
    $(id).classList.toggle("hidden", id !== screen));
}

function startExam(subset){
  order = subset ? shuffle(subset) : pickRandom(30);
  buildVariants(order);
  pos = 0; answers = {}; streak = 0;
  updateStreak();
  startTime = Date.now();
  clearInterval(timerInt);
  timerInt = setInterval(() => { $("timer").textContent = fmtTime(Date.now() - startTime); }, 1000);
  $("timer").textContent = "00:00";
  show("screen-quiz");
  renderQuestion();
  window.scrollTo({ top: 0 });
}

function updateStreak(){
  const chip = $("streak");
  chip.classList.toggle("on", streak >= 2);
  $("streak-n").textContent = streak;
}

function renderQuestion(){
  const qi = order[pos];
  const q  = QUESTIONS[qi];
  $("q-section").textContent = q.b;
  $("q-num").textContent = `Sual ${pos + 1}`;
  $("q-text").innerHTML = q.q;
  $("progress-text").textContent = `Sual ${pos + 1} / ${order.length}`;

  const notaBox = $("q-notation");
  if (q.nota){ notaBox.classList.remove("hidden"); renderNotation(notaBox, q.nota, q.notaOpts); }
  else { notaBox.classList.add("hidden"); notaBox.innerHTML = ""; }

  const audioBox = $("q-audio");
  if (q.audio){
    audioBox.classList.remove("hidden");
    currentAudio = q.audio;
    $("audio-hint").textContent = q.audio.type === "scale"
      ? "Qamma ardńĪcńĪl s…ôsl…ôn…ôc…ôk ‚ÄĒ ist…ônil…ôn q…ôd…ôr t…ôkrar dinl…ôy…ô bil…ôrs…ôn"
      : "∆Źvv…ôl melodik (ardńĪcńĪl), sonra harmonik (birg…ô) s…ôsl…ôn…ôc…ôk";
  } else {
    audioBox.classList.add("hidden");
    currentAudio = null;
  }

  const optsBox = $("q-opts");
  optsBox.innerHTML = "";
  const v = variants[qi] || { opts: q.o, c: q.c };
  const chosen = answers[qi];
  v.opts.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = `<span class="letter">${"ABCDE"[i]}</span><span>${text}</span>`;
    if (chosen !== undefined){
      btn.disabled = true;
      if (i === v.c) btn.classList.add("correct");
      else if (i === chosen) btn.classList.add("wrong");
    } else {
      btn.addEventListener("click", () => answer(qi, i));
    }
    optsBox.appendChild(btn);
  });

  const izah = $("q-izah");
  if (chosen !== undefined){
    const ok = chosen === v.c;
    const head = ok
      ? PRAISE[Math.floor(Math.random()*PRAISE.length)] + (streak >= 3 ? ` ūüĒ• ${streak} ardńĪcńĪl!` : "")
      : ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)] + ` Dońüru cavab: ${"ABCDE"[v.c]}.`;
    izah.className = "izah" + (ok ? "" : " err");
    izah.innerHTML = `<span class="praise">${head}</span>` + q.izah;
    izah.classList.remove("hidden");
  } else {
    izah.classList.add("hidden");
  }

  $("btn-prev").disabled = pos === 0;
  const nextBtn = $("btn-next");
  nextBtn.disabled = chosen === undefined;
  nextBtn.textContent = (pos === order.length - 1) ? "N…ôtic…ôni g√∂r" : "N√∂vb…ôti";

  renderQmap();
  drawProgressStaff();
}

function answer(qi, i){
  if (answers[qi] !== undefined) return;
  answers[qi] = i;
  streak = (i === correctOf(qi)) ? streak + 1 : 0;
  updateStreak();
  renderQuestion();
}

function renderQmap(){
  const box = $("qmap");
  box.innerHTML = "";
  order.forEach((qi, i) => {
    const d = document.createElement("button");
    d.className = "qdot";
    d.textContent = i + 1;
    if (answers[qi] !== undefined)
      d.classList.add(answers[qi] === correctOf(qi) ? "ok" : "bad");
    if (i === pos) d.classList.add("now");
    d.addEventListener("click", () => { pos = i; renderQuestion(); });
    box.appendChild(d);
  });
}

function finish(){
  clearInterval(timerInt);
  const total = order.length;
  const correct = order.filter(qi => answers[qi] === correctOf(qi)).length;
  $("score-num").textContent = correct;
  $("score-total").textContent = total;
  const pct = Math.round(correct / total * 100);
  const v = $("verdict");
  if (pct >= 90){ v.textContent = "∆Źla n…ôtic…ô! ńįmtahana hazńĪrsan. ūüéľ"; v.style.color = "var(--ok)"; }
  else if (pct >= 70){ v.textContent = "YaxŇüńĪ n…ôtic…ô ‚ÄĒ z…ôif m√∂vzularńĪ bir d…ô t…ôkrar et. ūüí™"; v.style.color = "var(--accent)"; }
  else if (pct >= 50){ v.textContent = "Orta n…ôtic…ô. AŇüańüńĪdakńĪ b√∂lm…ôl…ôr…ô diqq…ôt yetir."; v.style.color = "var(--gold)"; }
  else { v.textContent = "Bu m√∂vzularńĪ yenid…ôn iŇül…ô ‚ÄĒ s…ôhvl…ôri t…ôkrar et."; v.style.color = "var(--bad)"; }
  $("result-time").textContent = `Vaxt: ${fmtTime(Date.now() - startTime)} ¬∑ Dońüruluq: ${pct}%`;

  const bySection = {};
  order.forEach(qi => {
    const q = QUESTIONS[qi];
    bySection[q.b] = bySection[q.b] || { t:0, c:0 };
    bySection[q.b].t++;
    if (answers[qi] === correctOf(qi)) bySection[q.b].c++;
  });
  const bars = $("section-bars");
  bars.innerHTML = "";
  Object.entries(bySection).forEach(([name, s]) => {
    const row = document.createElement("div");
    row.className = "bar-row";
    const p = Math.round(s.c / s.t * 100);
    row.innerHTML =
      `<div class="lbl"><span>${name}</span><span>${s.c}/${s.t}</span></div>
       <div class="bar"><i style="width:${p}%; background:${p>=70?"var(--ok)":p>=50?"var(--accent)":"var(--bad)"}"></i></div>`;
    bars.appendChild(row);
  });

  saveResult({
    score: correct, total: total,
    duration_sec: Math.round((Date.now() - startTime) / 1000),
    sections: bySection
  });

  const wrong = order.filter(qi => answers[qi] !== correctOf(qi));
  $("btn-retry-wrong").classList.toggle("hidden", wrong.length === 0);
  show("screen-result");
  window.scrollTo({ top: 0 });
}

/* ---- baŇülanńüńĪc ---- */
function buildStart(){
  drawHeroStaff();
  const counts = {};
  QUESTIONS.forEach(q => counts[q.b] = (counts[q.b] || 0) + 1);
  const list = $("start-list");
  list.innerHTML = "";
  Object.entries(counts).forEach(([name, n]) => {
    const r = document.createElement("div");
    r.className = "row";
    r.innerHTML = `<span>${name}</span><span>${n} sual</span>`;
    list.appendChild(r);
  });
  $("motto").textContent = MOTTOS[Math.floor(Math.random()*MOTTOS.length)];
}

$("btn-quick").addEventListener("click", () => startExam());
$("btn-full").addEventListener("click", () => startExam(QUESTIONS.map((_, i) => i)));
$("btn-prev").addEventListener("click", () => { if (pos > 0){ pos--; renderQuestion(); } });
$("btn-next").addEventListener("click", () => {
  if (pos === order.length - 1) finish();
  else { pos++; renderQuestion(); window.scrollTo({ top: 0, behavior: "smooth" }); }
});
$("btn-restart").addEventListener("click", () => { show("screen-start"); buildStart(); loadHistory(); });
$("btn-retry-wrong").addEventListener("click", () => {
  const wrong = order.filter(qi => answers[qi] !== correctOf(qi));
  startExam(wrong);
});

buildStart();
loadHistory();
</script>
