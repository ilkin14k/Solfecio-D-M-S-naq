<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solfecio Sınaq İmtahanı — DİM formatı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBFBF8;
  --card:#FFFFFF;
  --ink:#23283D;
  --muted:#7A7F94;
  --line:#ECEDF2;
  --accent:#3554D1;
  --accent-soft:#EEF1FD;
  --ok:#14804A;
  --ok-soft:#E6F5EC;
  --bad:#C63B3B;
  --bad-soft:#FCEDED;
  --gold:#C9930A;
  --r:18px;
  --shadow:0 2px 18px rgba(35,40,61,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;line-height:1.55;
}
.wrap{max-width:640px;margin:0 auto;padding:24px 18px 56px}

/* ---------- başlıq ---------- */
header{padding:14px 0 4px}
.eyebrow{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:800}
h1{font-family:'Spectral',Georgia,serif;font-weight:700;font-size:clamp(27px,6.5vw,36px);line-height:1.12;margin-top:8px;letter-spacing:-.01em}
.sub{color:var(--muted);margin-top:10px;font-size:15px;max-width:46ch}

/* ---------- proqres ştatı ---------- */
.progress-staff{margin:20px 0 2px}
.progress-staff svg{width:100%;height:auto;display:block}
.meta-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);font-weight:700;margin-top:6px}
.meta-left{display:flex;align-items:center;gap:10px}
.streak{
  display:none;align-items:center;gap:4px;
  background:#FFF7E3;color:var(--gold);
  border-radius:999px;padding:3px 10px;font-size:12.5px;font-weight:800;
}
.streak.on{display:inline-flex}
.timer{font-variant-numeric:tabular-nums}

/* ---------- kartlar ---------- */
.card{background:var(--card);border-radius:var(--r);padding:26px 22px;margin-top:18px;box-shadow:var(--shadow)}
.section-tag{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.qnum{font-family:'Spectral',Georgia,serif;font-weight:600;font-size:14px;color:var(--muted);margin-top:14px}
.qtext{font-family:'Spectral',Georgia,serif;font-size:20px;font-weight:600;margin-top:6px;line-height:1.42}
.notation{margin:18px 0 4px;padding:10px 6px;border-radius:14px;background:var(--bg);overflow-x:auto}
.notation svg{display:block;margin:0 auto;max-width:100%}

/* ---------- variantlar ---------- */
.opts{margin-top:16px;display:grid;gap:9px}
.opt{
  display:flex;align-items:flex-start;gap:12px;width:100%;
  min-height:50px;padding:13px 15px;border-radius:14px;
  border:none;background:#F5F6F9;color:var(--ink);
  font-family:inherit;font-size:15.5px;font-weight:600;text-align:left;
  cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s;
}
.opt:not(:disabled):hover{background:var(--accent-soft)}
.opt:not(:disabled):active{transform:scale(.985)}
.opt:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.opt .letter{
  flex:0 0 27px;height:27px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:#fff;color:var(--muted);font-weight:800;font-size:13px;margin-top:1px;
  box-shadow:0 1px 3px rgba(35,40,61,.1);
}
.opt.correct{background:var(--ok-soft)}
.opt.correct .letter{background:var(--ok);color:#fff;box-shadow:none}
.opt.wrong{background:var(--bad-soft)}
.opt.wrong .letter{background:var(--bad);color:#fff;box-shadow:none}
.opt:disabled{cursor:default}
.opt:disabled:not(.correct):not(.wrong){opacity:.45}

/* ---------- dinləmə ---------- */
.audio-panel{
  margin:18px 0 4px;padding:18px;border-radius:14px;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;gap:9px;
}
.play-btn{
  min-height:54px;min-width:180px;border:none;border-radius:999px;cursor:pointer;
  background:var(--accent);color:#fff;font-family:inherit;font-size:16.5px;font-weight:800;
  box-shadow:0 4px 14px rgba(53,84,209,.25);
  transition:filter .15s,transform .1s;
}
.play-btn:hover{filter:brightness(1.07)}
.play-btn:active{transform:scale(.97)}
.play-btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.audio-hint{font-size:12.5px;color:var(--muted);font-weight:600}

/* ---------- izah ---------- */
.izah{margin-top:16px;padding:15px 17px;border-radius:14px;font-size:14.5px;background:var(--ok-soft);animation:fadeUp .25s ease}
.izah.err{background:var(--bad-soft)}
.izah .praise{display:block;font-weight:800;margin-bottom:3px}
.izah.err .praise{color:var(--bad)}
.izah:not(.err) .praise{color:var(--ok)}
.izah b{font-weight:800}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.izah{animation:none}.opt{transition:none}}

/* ---------- naviqasiya ---------- */
.nav-row{display:flex;gap:10px;margin-top:20px}
.btn{
  flex:1;min-height:52px;border-radius:14px;border:none;cursor:pointer;
  font-family:inherit;font-size:16px;font-weight:800;
  transition:filter .15s,transform .1s;
}
.btn:active{transform:scale(.98)}
.btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(53,84,209,.22)}
.btn-primary:hover{filter:brightness(1.07)}
.btn-primary:disabled{background:var(--line);color:var(--muted);box-shadow:none;cursor:default}
.btn-ghost{background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1.5px var(--line)}
.btn-ghost:hover{box-shadow:inset 0 0 0 1.5px var(--accent);color:var(--accent)}

/* ---------- sual xəritəsi ---------- */
.qmap{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px}
.qdot{
  width:33px;height:33px;border-radius:10px;border:none;background:#fff;
  font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;box-shadow:inset 0 0 0 1.5px var(--line);
}
.qdot.now{box-shadow:inset 0 0 0 2px var(--accent);color:var(--accent)}
.qdot.ok{background:var(--ok-soft);box-shadow:none;color:var(--ok)}
.qdot.bad{background:var(--bad-soft);box-shadow:none;color:var(--bad)}

/* ---------- başlanğıc / nəticə ---------- */
.hero-staff{margin:6px 0 8px}
.start-list{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.start-list .row{
  display:flex;flex-direction:column;gap:2px;
  padding:12px 14px;border-radius:12px;background:var(--bg);
  font-size:13.5px;font-weight:700;
}
.start-list .row span:last-child{color:var(--muted);font-weight:600;font-size:12.5px}
.motto{
  margin-top:18px;padding:14px 16px;border-radius:14px;
  background:var(--accent-soft);color:var(--accent);
  font-size:14.5px;font-weight:700;text-align:center;
}
.history{margin-top:20px}
.history h3{font-family:'Spectral',Georgia,serif;font-size:16px;font-weight:700;margin-bottom:6px}
.h-row{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;color:var(--muted)}
.h-row:last-child{border-bottom:none}
.h-row .g{color:var(--ok)} .h-row .cb{color:var(--accent)} .h-row .r{color:var(--bad)}
.score-big{font-family:'Spectral',Georgia,serif;font-weight:700;font-size:clamp(46px,13vw,68px);line-height:1;margin-top:12px}
.score-big small{font-size:.38em;color:var(--muted);font-weight:500}
.verdict{margin-top:8px;font-size:16.5px;font-weight:800}
.bars{margin-top:20px;display:grid;gap:13px}
.bar-row .lbl{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:5px}
.bar-row .lbl span:last-child{color:var(--muted)}
.bar{height:8px;border-radius:99px;background:var(--bg);overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;transition:width .5s ease}
footer{margin-top:30px;text-align:center;font-size:12.5px;color:var(--muted)}
.hidden{display:none !important}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Musiqi nəzəriyyəsi və solfecio · DİM formatı</div>
    <h1>Solfecio Sınaq İmtahanı</h1>
    <p class="sub">90 suallıq baza — hər cəhddə fərqli suallar, dərhal yoxlama və izahlar.</p>
  </header>

  <!-- BAŞLANĞIC -->
  <section id="screen-start">
    <div class="card">
      <div class="hero-staff" id="hero-staff" aria-hidden="true"></div>
      <div class="start-list" id="start-list"></div>
      <div class="motto" id="motto"></div>
      <div class="nav-row">
        <button class="btn btn-primary" id="btn-quick">Sürətli sınaq · 30 sual</button>
      </div>
      <div class="nav-row" style="margin-top:10px">
        <button class="btn btn-ghost" id="btn-full">Tam məşq · 146 sual</button>
      </div>
      <div class="history" id="history"></div>
    </div>
  </section>

  <!-- SUAL -->
  <section id="screen-quiz" class="hidden">
    <div class="progress-staff" id="progress-staff" aria-hidden="true"></div>
    <div class="meta-row">
      <div class="meta-left">
        <span id="progress-text">Sual 1 / 30</span>
        <span class="streak" id="streak">🔥 <span id="streak-n">0</span></span>
      </div>
      <span class="timer" id="timer">00:00</span>
    </div>

    <div class="card">
      <span class="section-tag" id="q-section"></span>
      <div class="qnum" id="q-num"></div>
      <div class="qtext" id="q-text"></div>
      <div class="notation hidden" id="q-notation"></div>
      <div class="audio-panel hidden" id="q-audio">
        <button class="play-btn" id="btn-play">🔊 Dinlə</button>
        <span class="audio-hint" id="audio-hint"></span>
      </div>
      <div class="opts" id="q-opts" role="group" aria-label="Cavab variantları"></div>
      <div class="izah hidden" id="q-izah"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="btn-prev">←</button>
        <button class="btn btn-primary" id="btn-next" disabled style="flex:3">Növbəti</button>
      </div>
    </div>

    <div class="qmap" id="qmap" aria-label="Sual xəritəsi"></div>
  </section>

  <!-- NƏTİCƏ -->
  <section id="screen-result" class="hidden">
    <div class="card">
      <span class="section-tag">Nəticə</span>
      <div class="score-big"><span id="score-num">0</span><small> / <span id="score-total">30</span></small></div>
      <div class="verdict" id="verdict"></div>
      <p class="sub" id="result-time"></p>
      <div class="bars" id="section-bars"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="btn-retry-wrong">Səhvləri təkrar et</button>
        <button class="btn btn-primary" id="btn-restart">Yeni sınaq</button>
      </div>
    </div>
  </section>

  <footer>Hazırlıq məqsədlidir · DİM-2026 proqramı və 2025 nümunəsi əsasında tərtib olunub</footer>
</div>

<script>
"use strict";

/* =========================================================
   1. NOTA RENDERİ — sadə SVG ştat çəkicisi
   ========================================================= */
const STEP = 6;
const LETTER_IDX = {C:0, D:1, E:2, F:3, G:4, A:5, H:6, B:6};
const ACC_GLYPH  = {"b":"\u266D", "#":"\u266F", "n":"\u266E"};

function noteIdx(name){
  return parseInt(name.slice(1),10) * 7 + LETTER_IDX[name[0].toUpperCase()];
}

function renderNotation(container, groups, opts){
  opts = opts || {};
  const gapX = opts.gapX || 58, startX = 66;
  const isBass = opts.clef === "bass";
  const ref = isBass ? 18 : 30;               // aşağı xətt: basda G2, skripkada E4
  const width = startX + groups.length * gapX + 26;
  const topY = 34, lineGap = 12;
  const bottomLineY = topY + 4 * lineGap;
  const yOf = idx => bottomLineY - (idx - ref) * STEP;
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox", `0 0 ${width} ${topY + 4*lineGap + 40}`);
  svg.setAttribute("width", Math.min(width, 540));
  svg.setAttribute("role","img");
  const line = (x1,y1,x2,y2,w) => {
    const l = document.createElementNS(NS,"line");
    l.setAttribute("x1",x1); l.setAttribute("y1",y1);
    l.setAttribute("x2",x2); l.setAttribute("y2",y2);
    l.setAttribute("stroke","#23283D"); l.setAttribute("stroke-width", w || 1.1);
    svg.appendChild(l);
  };
  for (let i=0;i<5;i++) line(8, topY+i*lineGap, width-10, topY+i*lineGap);
  line(width-10, topY, width-10, topY+4*lineGap, 2.4);
  const clef = document.createElementNS(NS,"text");
  if (isBass){
    clef.setAttribute("x",14); clef.setAttribute("y", topY + 3*lineGap + 2);
    clef.setAttribute("font-size","44");
    clef.textContent = "\uD834\uDD22";                         // 𝄢
  } else {
    clef.setAttribute("x",14); clef.setAttribute("y", bottomLineY + 3);
    clef.setAttribute("font-size","58");
    clef.textContent = "\uD834\uDD1E";                         // 𝄞
  }
  clef.setAttribute("fill","#23283D");
  svg.appendChild(clef);
  groups.forEach((chord, gi) => {
    const cx = startX + gi * gapX;
    chord.forEach(note => {
      const idx = noteIdx(note.n), cy = yOf(idx);
      if (idx <= ref - 2)
        for (let e = ref-2; e >= (idx%2===0 ? idx : idx+1); e -= 2) line(cx-12,yOf(e),cx+12,yOf(e));
      if (idx >= ref + 10)
        for (let e = ref+10; e <= (idx%2===0 ? idx : idx-1); e += 2) line(cx-12,yOf(e),cx+12,yOf(e));
      const outer = document.createElementNS(NS,"ellipse");
      outer.setAttribute("cx",cx); outer.setAttribute("cy",cy);
      outer.setAttribute("rx",7.6); outer.setAttribute("ry",5);
      outer.setAttribute("fill","#23283D");
      svg.appendChild(outer);
      const inner = document.createElementNS(NS,"ellipse");
      inner.setAttribute("cx",cx); inner.setAttribute("cy",cy);
      inner.setAttribute("rx",4.1); inner.setAttribute("ry",2.5);
      inner.setAttribute("fill","#fff");
      inner.setAttribute("transform",`rotate(-22 ${cx} ${cy})`);
      svg.appendChild(inner);
      if (note.acc){
        const a = document.createElementNS(NS,"text");
        a.setAttribute("x",cx-20); a.setAttribute("y",cy+5);
        a.setAttribute("font-size","19"); a.setAttribute("fill","#23283D");
        a.textContent = ACC_GLYPH[note.acc];
        svg.appendChild(a);
      }
    });
  });
  container.innerHTML = "";
  container.appendChild(svg);
}

/* =========================================================
   2. SUAL BAZASI — 90 sual, DİM 2025 strukturu üzrə
   ========================================================= */
const S = {
  INT:"İntervallar", AKK:"Akkordlar", LAD:"Qammalar və ladlar",
  TON:"Tonallıqlar", RIT:"Ritm və ölçü", MEQ:"Azərbaycan məqamları",
  TEM:"Temp və dinamika", DIN:"Dinləmə", UMM:"Ümumi nəzəriyyə"
};

const QUESTIONS = [
/* ================= İNTERVALLAR (18) ================= */
{ b:S.INT, q:"Verilmiş intervalı təyin edin.", nota:[[{n:"F4"},{n:"H4"}]],
  o:["x₄","art.₄","əsk.₅","b₃","x₅"], c:1,
  izah:"F–H intervalı 3 tondan ibarətdir (triton). Hərf həcmi kvartadır — <b>artırılmış kvarta (art.₄)</b>." },
{ b:S.INT, q:"Verilmiş intervalı təyin edin.", nota:[[{n:"H3"},{n:"F4"}]],
  o:["x₅","art.₄","əsk.₅","k₆","x₄"], c:2,
  izah:"H–F də 3 tondur, lakin hərf həcmi kvintadır — <b>əskildilmiş kvinta (əsk.₅)</b>." },
{ b:S.INT, q:"Verilmiş intervalı təyin edin.", nota:[[{n:"C4"},{n:"A4"}]],
  o:["k₆","b₆","x₅","k₇","b₇"], c:1,
  izah:"C–A intervalı 4,5 tondur, hərf həcmi sekstadır — <b>böyük seksta (b₆)</b>." },
{ b:S.INT, q:"b₂ intervalı neçə yarımtondan ibarətdir?",
  o:["1 yarımton","2 yarımton","3 yarımton","4 yarımton","yarımton yoxdur"], c:1,
  izah:"Böyük sekunda <b>1 tona = 2 yarımtona</b> bərabərdir. Kiçik sekunda isə 1 yarımtondur." },
{ b:S.INT, q:"b₇ intervalı neçə tondan ibarətdir?",
  o:["5 ton","5,5 ton","6 ton","4,5 ton","3,5 ton"], c:1,
  izah:"Böyük septima <b>5,5 tondur</b> (11 yarımton). Kiçik septima isə 5 tondur." },
{ b:S.INT, q:"k₃ intervalı natural major qammasının neçənci pillələrindən qurulur?",
  o:["II, III, VI, VII","I, IV, V","I, II, III","IV, V, VII","II, IV, VI"], c:0,
  izah:"Natural majorda kiçik tersiya <b>II, III, VI, VII</b> pillələrdən qurulur." },
{ b:S.INT, q:"b₃ intervalı natural major qammasının neçənci pillələrindən qurulur?",
  o:["I, IV, V","II, III, VI","III, VI, VII","I, II, IV","IV, V, VII"], c:0,
  izah:"Böyük tersiya natural majorda <b>I, IV, V</b> pillələrdən qurulur — bunlar əsas pillələrdir." },
{ b:S.INT, q:"x₅ intervalı natural major qammasının hansı pilləsində qurulmur?",
  o:["II","IV","V","VII","VI"], c:3,
  izah:"<b>VII pillədə</b> xalis kvinta yox, əsk.₅ qurulur (C-dur-da H–F)." },
{ b:S.INT, q:"Harmonik minorda art.₂ intervalı hansı pillədə qurulur?",
  o:["II","IV","VI","VII","V"], c:2,
  izah:"VII pillənin yüksəldilməsi nəticəsində <b>VI–VII pillələr arasında art.₂</b> yaranır (a-moll: f–gis)." },
{ b:S.INT, q:"Natural minorda art.₄ intervalı hansı pillədə qurulur?",
  o:["II","IV","VI","VII","III"], c:2,
  izah:"Natural minorda triton: <b>VI pillədə art.₄</b> (a-moll: f–h), II pillədə isə əsk.₅ qurulur." },
{ b:S.INT, q:"x₄ intervalının çevrilməsi hansı intervaldır?",
  o:["x₅","art.₄","k₅","əsk.₄","x₈"], c:0,
  izah:"Kvarta kvintaya çevrilir, xalis interval xalis qalır: <b>x₄ → x₅</b>." },
{ b:S.INT, q:"b₆ intervalının çevrilməsi hansı intervaldır?",
  o:["b₃","k₃","x₃","k₆","b₂"], c:1,
  izah:"Seksta tersiyaya, böyük interval kiçiyə çevrilir: <b>b₆ → k₃</b>." },
{ b:S.INT, q:"k₇ intervalının çevrilməsi hansı intervaldır?",
  o:["k₂","b₂","b₇","x₂","k₃"], c:1,
  izah:"Septima sekundaya, kiçik interval böyüyə çevrilir: <b>k₇ → b₂</b>." },
{ b:S.INT, q:"x₁ (prima) intervalının çevrilməsi hansı intervaldır?",
  o:["x₈","x₅","x₄","x₂","b₇"], c:0,
  izah:"Prima oktavaya çevrilir: <b>x₁ → x₈</b>. Çevrilmədə intervalların cəmi həmişə 9 edir." },
{ b:S.INT, q:"art.₄ intervalı ilə enharmonik bərabər olan interval hansıdır?",
  o:["x₄","x₅","əsk.₅","k₅","b₄"], c:2,
  izah:"Hər ikisi tritondur (3 ton): <b>art.₄ = əsk.₅</b>. Səslənmə eyni, yazılış fərqlidir." },
{ b:S.INT, q:"art.₂ intervalı ilə enharmonik bərabər olan interval hansıdır?",
  o:["b₂","k₃","b₃","x₃","k₂"], c:1,
  izah:"Artırılmış sekunda 1,5 tondur — <b>kiçik tersiyanın (k₃)</b> həcminə bərabərdir." },
{ b:S.INT, q:"Bunlardan hansı diatonik yarımtondur?",
  o:["c – cis","e – f","g – gis","d – dis","a – ais"], c:1,
  izah:"Diatonik yarımton <b>fərqli adlı</b> qonşu pillələr arasında olur: <b>e–f</b>. Eyni hərfli olanlar (c–cis) xromatikdir." },
{ b:S.INT, q:"Bunlardan hansı xromatik yarımtondur?",
  o:["e – f","h – c","g – gis","f – ges","c – des"], c:2,
  izah:"Xromatik yarımton <b>eyni adlı</b> pillənin alterasiyasıdır: <b>g–gis</b>. Qalanları diatonikdir." },

/* ================= RİTM VƏ ÖLÇÜ (12) ================= */
{ b:S.RIT, q:"Nöqtəli dördlük not (♩.) neçə səkkizlik notuna bərabərdir?",

  o:["2","3","4","6","1,5"], c:1,

{ b:S.RIT, q:"6/8 ölçüsü hansı ölçü növünə aiddir?",
  o:["Sadə ölçü","Mürəkkəb ölçü","Qarışıq ölçü","Dəyişkən ölçü","Sərbəst ölçü"], c:1,

  o:["Sadə ölçü","Mürəkkəb ölçü","Qarışıq ölçü","Dəyişkən ölçü","Sərbəst ölçü"], c:2,
  izah:"5/4 = 2/4 + 3/4 — <b>fərqli</b> sadə ölçülərin birləşməsi, <b>qarışıq ölçüdür</b>." },
{ b:S.RIT, q:"6/8 ölçüsündə güclü (vurğulu) hissələr hansılardır?",

{ b:S.RIT, q:"Triol nədir?",

  izah:"Triol — bir not dəyərinin adi iki yerinə <b>üç bərabər hissəyə bölünməsidir</b> (üzərində 3 rəqəmi yazılır)." },
{ b:S.RIT, q:"Ölçünün yuxarı rəqəmi nəyi göstərir?",

{ b:S.RIT, q:"Ölçünün aşağı rəqəmi nəyi göstərir?",
  o:["Xanədəki hissələrin sayını","Hər hissənin not dəyərini","Tempi","Dinamikanı","Xanələrin sayını"], c:1,

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* bölmələr üzrə mütənasib təsadüfi seçim */
function pickRandom(count){
  const bySec = {};
  QUESTIONS.forEach((q, i) => { (bySec[q.b] = bySec[q.b] || []).push(i); });
  const secs = Object.keys(bySec);
  const total = QUESTIONS.length;
  let picked = [], fracs = [];
  secs.forEach(sec => {
    const exact = bySec[sec].length * count / total;
    const take = Math.floor(exact);
    fracs.push({ sec, frac: exact - take });
    picked = picked.concat(shuffle(bySec[sec]).slice(0, take));
  });
  fracs.sort((a,b) => b.frac - a.frac);
  let fi = 0;
  while (picked.length < count && fi < fracs.length){
    const sec = fracs[fi++].sec;
    const extra = bySec[sec].find(i => !picked.includes(i));
    if (extra !== undefined) picked.push(extra);
  }
  return shuffle(picked);
}

function buildVariants(qIndexes){
  variants = {};
  qIndexes.forEach(qi => {
    const q = QUESTIONS[qi];
    const perm = shuffle(q.o.map((_, i) => i));
    variants[qi] = { opts: perm.map(i => q.o[i]), c: perm.indexOf(q.c) };
  });
}

const correctOf = qi => variants[qi] ? variants[qi].c : QUESTIONS[qi].c;

let audioCtx = null, currentAudio = null, lockTimer = null;

/* Konteksti etibarlı şəkildə "running" vəziyyətinə gətirir.
   iOS bəzən kontekstı arxa planda dayandırır (suspended/interrupted) —
   bərpa alınmasa, tamamilə yenisi yaradılır. */
async function ensureCtx(){
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!audioCtx || audioCtx.state === "closed") audioCtx = new AC();
  try { await audioCtx.resume(); } catch(e){}
  if (audioCtx.state !== "running"){
    try { await audioCtx.close(); } catch(e){}
    audioCtx = new AC();
    try { await audioCtx.resume(); } catch(e){}
  }
  return audioCtx;
}

/* piano bənzəri not: harmoniklər + sürətli hücum + eksponensial sönmə */
function pianoNote(c, midi, t0, dur, vel){
  const f = 440 * Math.pow(2, (midi - 69) / 12);
  const partials = [[1, 1], [2, 0.45], [3, 0.22], [4, 0.1], [5, 0.05]];
  const master = c.createGain();
  const v = vel || 0.3;
  master.gain.setValueAtTime(0.0001, t0);
  master.gain.exponentialRampToValueAtTime(v, t0 + 0.012);
  master.gain.exponentialRampToValueAtTime(v * 0.35, t0 + dur * 0.45);
  master.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  const lp = c.createBiquadFilter();
  lp.type = "lowpass";
  lp.frequency.value = Math.min(f * 6, 8000);
  master.connect(lp); lp.connect(c.destination);
  partials.forEach(([n, amp]) => {
    const o = c.createOscillator(), g = c.createGain();
    o.type = "sine";
    o.frequency.value = f * n;
    g.gain.value = amp;
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.1);
  });
}

async function playAudio(a){
  if (!a) return;
  try {
    const c = await ensureCtx();
    const buf = c.createBuffer(1, 1, 22050);          // iOS kilidaçma hiyləsi
    const src = c.createBufferSource();
    src.buffer = buf; src.connect(c.destination); src.start(0);

    let t = c.currentTime + 0.12, end;
    if (a.type === "scale"){
      a.notes.forEach(m => { pianoNote(c, m, t, 0.7, 0.3); t += 0.5; });
      end = t + 0.5;
    } else {
      a.notes.forEach(m => { pianoNote(c, m, t, 0.95, 0.32); t += 0.68; });   // melodik
      t += 0.35;
      const vel = 0.42 / Math.sqrt(a.notes.length);
      a.notes.forEach(m => pianoNote(c, m, t, 2.4, vel));                     // harmonik
      end = t + 2.4;
    }
    lockPlayBtn(end - c.currentTime);
  } catch(e){ resetPlayBtn("🔊 Dinlə"); }
}

  optsBox.innerHTML = "";
  const v = variants[qi] || { opts: q.o, c: q.c };
  const chosen = answers[qi];
  v.opts.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = `<span class="letter">${"ABCDE"[i]}</span><span>${text}</span>`;
    if (chosen !== undefined){
      btn.disabled = true;
      if (i === v.c) btn.classList.add("correct");
      else if (i === chosen) btn.classList.add("wrong");
    } else {
      btn.addEventListener("click", () => answer(qi, i));
    }
    optsBox.appendChild(btn);
  });

  const izah = $("q-izah");
  if (chosen !== undefined){
    const ok = chosen === v.c;
    const head = ok
      ? PRAISE[Math.floor(Math.random()*PRAISE.length)] + (streak >= 3 ? ` 🔥 ${streak} ardıcıl!` : "")
      : ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)] + ` Doğru cavab: ${"ABCDE"[v.c]}.`;
    izah.className = "izah" + (ok ? "" : " err");
    izah.innerHTML = `<span class="praise">${head}</span>` + q.izah;
    izah.classList.remove("hidden");
  } else {
    izah.classList.add("hidden");
  }

  $("btn-prev").disabled = pos === 0;
  const nextBtn = $("btn-next");
  nextBtn.disabled = chosen === undefined;
  nextBtn.textContent = (pos === order.length - 1) ? "Nəticəni gör" : "Növbəti";

  renderQmap();
  drawProgressStaff();
}

function answer(qi, i){
  if (answers[qi] !== undefined) return;
  answers[qi] = i;
  streak = (i === correctOf(qi)) ? streak + 1 : 0;
  updateStreak();
  renderQuestion();
}

function renderQmap(){
  const box = $("qmap");
  box.innerHTML = "";
  order.forEach((qi, i) => {
    const d = document.createElement("button");
    d.className = "qdot";
    d.textContent = i + 1;
    if (answers[qi] !== undefined)
      d.classList.add(answers[qi] === correctOf(qi) ? "ok" : "bad");
    if (i === pos) d.classList.add("now");
    d.addEventListener("click", () => { pos = i; renderQuestion(); });
    box.appendChild(d);
  });
}

function finish(){
  clearInterval(timerInt);
  const total = order.length;
  const correct = order.filter(qi => answers[qi] === correctOf(qi)).length;
  $("score-num").textContent = correct;
  $("score-total").textContent = total;
  const pct = Math.round(correct / total * 100);
  const v = $("verdict");
  if (pct >= 90){ v.textContent = "Əla nəticə! İmtahana hazırsan. 🎼"; v.style.color = "var(--ok)"; }
  else if (pct >= 70){ v.textContent = "Yaxşı nəticə — zəif mövzuları bir də təkrar et. 💪"; v.style.color = "var(--accent)"; }
  else if (pct >= 50){ v.textContent = "Orta nəticə. Aşağıdakı bölmələrə diqqət yetir."; v.style.color = "var(--gold)"; }
  else { v.textContent = "Bu mövzuları yenidən işlə — səhvləri təkrar et."; v.style.color = "var(--bad)"; }
  $("result-time").textContent = `Vaxt: ${fmtTime(Date.now() - startTime)} · Doğruluq: ${pct}%`;

  const bySection = {};
  order.forEach(qi => {
    const q = QUESTIONS[qi];
    bySection[q.b] = bySection[q.b] || { t:0, c:0 };
    bySection[q.b].t++;
    if (answers[qi] === correctOf(qi)) bySection[q.b].c++;
  });
  const bars = $("section-bars");
  bars.innerHTML = "";
  Object.entries(bySection).forEach(([name, s]) => {
    const row = document.createElement("div");
    row.className = "bar-row";
    const p = Math.round(s.c / s.t * 100);
    row.innerHTML =
      `<div class="lbl"><span>${name}</span><span>${s.c}/${s.t}</span></div>
       <div class="bar"><i style="width:${p}%; background:${p>=70?"var(--ok)":p>=50?"var(--accent)":"var(--bad)"}"></i></div>`;
    bars.appendChild(row);
  });

  saveResult({
    score: correct, total: total,
    duration_sec: Math.round((Date.now() - startTime) / 1000),
    sections: bySection
  });

  const wrong = order.filter(qi => answers[qi] !== correctOf(qi));
  $("btn-retry-wrong").classList.toggle("hidden", wrong.length === 0);
  show("screen-result");
  window.scrollTo({ top: 0 });
}

/* ---- başlanğıc ---- */
function buildStart(){
  drawHeroStaff();
  const counts = {};
  QUESTIONS.forEach(q => counts[q.b] = (counts[q.b] || 0) + 1);
  const list = $("start-list");
  list.innerHTML = "";
  Object.entries(counts).forEach(([name, n]) => {
    const r = document.createElement("div");
    r.className = "row";
    r.innerHTML = `<span>${name}</span><span>${n} sual</span>`;
    list.appendChild(r);
  });
  $("motto").textContent = MOTTOS[Math.floor(Math.random()*MOTTOS.length)];
}

$("btn-quick").addEventListener("click", () => startExam());
$("btn-full").addEventListener("click", () => startExam(QUESTIONS.map((_, i) => i)));
$("btn-prev").addEventListener("click", () => { if (pos > 0){ pos--; renderQuestion(); } });
$("btn-next").addEventListener("click", () => {
  if (pos === order.length - 1) finish();
  else { pos++; renderQuestion(); window.scrollTo({ top: 0, behavior: "smooth" }); }
});
$("btn-restart").addEventListener("click", () => { show("screen-start"); buildStart(); loadHistory(); });
$("btn-retry-wrong").addEventListener("click", () => {
  const wrong = order.filter(qi => answers[qi] !== correctOf(qi));
  startExam(wrong);
});

buildStart();
loadHistory();
</script>
</body>
</html>
